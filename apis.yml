name: Gitcoin
description: Gitcoin is a public goods funding platform that enables communities to
  fund open-source software, research, and other digital public goods through quadratic
  funding, direct grants, and bounties. The platform provides REST APIs for querying
  grants, bounties, funding rounds, and project metadata, as well as the Gitcoin Passport
  Stamps API for verifiable credential scoring and identity verification.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Public Goods
- Grants
- Bounties
- Quadratic Funding
- Web3
- Verifiable Credentials
- Identity
- Open Source
