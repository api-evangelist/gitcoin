apis:
- name: Gitcoin Core API
  description: Read-only REST API providing access to Gitcoin bounties and grants
    data. Supports filtering by experience level, project length, bounty type, owner
    address, open status, and GitHub URL. Returns JSON-formatted data including funding
    amounts, contributor addresses, token types, and project metadata.
