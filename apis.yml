- name: Gitcoin Grants API
  description: API for querying Gitcoin grants data including grant listings, contributors
    by round, and addresses that have funded grants. The grants API supports filtering
    by title, admin address, description, keyword, grant type, and primary key. Also
    exposes contributor export endpoints for quadratic funding rounds.
