- name: Gitcoin Passport Stamps API
  description: REST API for retrieving Gitcoin Passport verifiable credential scores
    and stamps for Ethereum addresses. Supports scoring by scorer ID, fetching all
    verified stamps for an address, and retrieving metadata about all available stamp
    types. Used to verify human identity and Sybil resistance in Web3 applications.
    Requires API key and scorer ID from the developer portal.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.passport.human.tech/building-with-passport/passport-api/api-reference
  baseURL: https://api.passport.xyz
