  """Unique donation identifier."""
  id: String!
  """The EVM chain this donation occurred on."""
  chainId: Int!
  """The round this donation was made in."""
  roundId: String!
  """The application (project in a round) that received this donation."""
  applicationId: String!
  """Donor wallet address."""
  donorAddress: String!
  """Recipient wallet address (project payout address)."""
  recipientAddress: String!
  """The project that received this donation."""
  projectId: String!
  """On-chain transaction hash."""
  transactionHash: String!
  """Block number of the donation."""
  blockNumber: BigFloat!
  """ERC-20 token address donated (or native token address)."""
  tokenAddress: String!
  """Donation amount in the token's native units."""
  amount: BigFloat!
  """Donation amount converted to USD at time of donation."""
  amountInUsd: Float!
  """Donation amount converted to round match token units."""
  amountInRoundMatchToken: BigFloat!
  """Block timestamp of the donation."""
  timestamp: Datetime!
  """The application that received this donation."""
  application: Application
  """The round this donation belongs to."""
  round: Round
}

