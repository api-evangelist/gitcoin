# ─── Project ──────────────────────────────────────────────────────────────────

"""
A project registered on the Allo Protocol (V2 profile) or carried over from
Gitcoin Grants V1. Each project belongs to a single chain and may have
multiple rounds, roles, and applications.
"""
type Project {
  """Unique project identifier (bytes32 profile ID for Allo V2)."""
  id: String!
  """Human-readable project name."""
  name: String!
  """The EVM chain this project is registered on."""
  chainId: Int!
  """Nonce used when creating the Allo V2 profile (null for V1 projects)."""
  nonce: BigFloat
  """On-chain anchor address for the project (Allo V2 only)."""
  anchorAddress: String
  """Sequential project number within the registry (V1 only)."""
  projectNumber: Int
  """Address of the Allo registry contract."""
  registryAddress: String!
  """IPFS CID pointing to the project's off-chain metadata JSON."""
  metadataCid: String
  """Deserialized project metadata (title, description, website, social links, etc.)."""
  metadata: JSON
  """Address that created this project."""
  createdByAddress: String!
  """Block number at which this project was created."""
  createdAtBlock: BigFloat!
  """Block number at which this project was last updated."""
  updatedAtBlock: BigFloat!
  """Array of classifier tags (e.g. ["allo-v2"])."""
  tags: [String]!
  """Whether this is a canonical or linked project."""
  projectType: ProjectType!
  """Roles (owner/member) assigned to this project."""
  projectRoles(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: ProjectRoleCondition
    filter: ProjectRoleFilter
    orderBy: [ProjectRolesOrderBy!]
  ): ProjectRolesConnection
  """Applications submitted for this project across rounds."""
  applications(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: ApplicationCondition
    filter: ApplicationFilter
    orderBy: [ApplicationsOrderBy!]
  ): ApplicationsConnection
  """Funding rounds created by or associated with this project."""
  rounds(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: RoundCondition
    filter: RoundFilter
    orderBy: [RoundsOrderBy!]
  ): RoundsConnection
}

type ProjectEdge {
  cursor: Cursor
  node: Project
}

type ProjectsConnection {
  nodes: [Project]!
  edges: [ProjectEdge]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input ProjectCondition {
  id: String
  chainId: Int
  name: String
  projectType: ProjectType
  registryAddress: String
  createdByAddress: String
  tags: [String]
}

input ProjectFilter {
  id: StringFilter
  chainId: IntFilter
  name: StringFilter
  projectType: ProjectTypeFilter
  tags: StringListFilter
  createdByAddress: StringFilter
  metadataCid: StringFilter
  and: [ProjectFilter!]
