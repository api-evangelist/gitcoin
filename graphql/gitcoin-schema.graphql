# ─── Query Root ───────────────────────────────────────────────────────────────

"""The root query type for the Gitcoin Grants Stack Indexer GraphQL API."""
type Query {
  """Returns the string 'Query' — useful as a liveness check."""
  query: Query

  # ── Projects ──────────────────────────────────────────────────────────────

  """Fetch a single project by its composite primary key (id + chainId)."""
  project(id: String!, chainId: Int!): Project

  """List all projects with optional filtering, sorting, and pagination."""
  projects(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: ProjectCondition
    filter: ProjectFilter
    orderBy: [ProjectsOrderBy!]
  ): ProjectsConnection

  # ── Rounds ────────────────────────────────────────────────────────────────

  """Fetch a single round by its composite primary key (id + chainId)."""
  round(id: String!, chainId: Int!): Round

  """List all rounds with optional filtering, sorting, and pagination."""
  rounds(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: RoundCondition
    filter: RoundFilter
    orderBy: [RoundsOrderBy!]
  ): RoundsConnection

  # ── Applications ──────────────────────────────────────────────────────────

  """Fetch a single application by its composite primary key (id + chainId + roundId)."""
  application(id: String!, chainId: Int!, roundId: String!): Application

  """List all applications with optional filtering, sorting, and pagination."""
