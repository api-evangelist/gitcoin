# ─── Enums ────────────────────────────────────────────────────────────────────

"""The type of a project — canonical (Allo V2 profile) or linked (Allo V1 grant)."""
enum ProjectType {
  CANONICAL
  LINKED
}

"""The current status of a grant application in a round."""
enum ApplicationStatus {
  PENDING
  APPROVED
