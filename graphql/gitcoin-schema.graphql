# ─── Round ────────────────────────────────────────────────────────────────────

"""
A Gitcoin Grants funding round deployed via the Allo Protocol. Each round
runs on a specific EVM chain, uses a matching strategy, and has defined
donation and application windows.
"""
type Round {
  """On-chain pool/round ID (address for Allo V1, uint256 for V2)."""
  id: String!
  """The EVM chain this round is deployed on."""
  chainId: Int!
  """Classifier tags (e.g. ["allo-v1"], ["allo-v2", "program"])."""
  tags: [String]!
  """Total match pool amount in the match token's native units."""
  matchAmount: BigFloat!
  """ERC-20 token address used for the match pool."""
  matchTokenAddress: String!
  """Match pool amount converted to USD."""
  matchAmountInUsd: Float!
  """Total amount funded into the round in native token units."""
  fundedAmount: BigFloat!
  """Total funded amount converted to USD."""
  fundedAmountInUsd: Float!
  """IPFS CID for the application schema metadata."""
  applicationMetadataCid: String!
  """Parsed application form schema."""
  applicationMetadata: JSON
  """IPFS CID for round-level metadata."""
  roundMetadataCid: String
  """Parsed round metadata (name, description, eligibility criteria, etc.)."""
  roundMetadata: JSON
  """When applications open (null if not yet set)."""
  applicationsStartTime: Datetime
  """When applications close (null if not yet set)."""
  applicationsEndTime: Datetime
  """When donations open."""
  donationsStartTime: Datetime
  """When donations close."""
  donationsEndTime: Datetime
  """Address that created this round."""
  createdByAddress: String!
  """Block number at which the round was created."""
  createdAtBlock: BigFloat!
  """Block number at which the round was last updated."""
  updatedAtBlock: BigFloat!
  """bytes32 role hash for round managers."""
  managerRole: String!
  """bytes32 role hash for round admins."""
  adminRole: String!
  """Address of the deployed funding strategy contract."""
  strategyAddress: String!
  """Strategy template ID (keccak hash of name)."""
  strategyId: String!
  """Human-readable strategy name (e.g. "allov2.DonationVotingMerkleDistributionDirectTransferStrategy")."""
  strategyName: String!
  """Computed matching distribution (JSON array of per-project allocations)."""
  matchingDistribution: JSON
  """Transaction hash of the readyForPayout call (null until payouts are ready)."""
  readyForPayoutTransaction: String
  """ID of the project that owns this round pool."""
  projectId: String!
  """Aggregate: total USD donated to all applications in this round."""
  totalAmountDonatedInUsd: Float!
  """Aggregate: total number of donation transactions in this round."""
  totalDonationsCount: Int!
  """Aggregate: number of unique donor addresses in this round."""
  uniqueDonorsCount: Int!
  """Aggregate: total amount distributed to recipients (in match token units)."""
  totalDistributed: BigFloat!
  """The owning project record."""
  project: Project
  """Applications submitted to this round."""
  applications(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: ApplicationCondition
    filter: ApplicationFilter
    orderBy: [ApplicationsOrderBy!]
  ): ApplicationsConnection
  """Donations made to applications in this round."""
  donations(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: DonationCondition
    filter: DonationFilter
    orderBy: [DonationsOrderBy!]
  ): DonationsConnection
  """Admin and manager role assignments for this round."""
  roundRoles(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: RoundRoleCondition
    filter: RoundRoleFilter
    orderBy: [RoundRolesOrderBy!]
  ): RoundRolesConnection
  """Payout records for approved applications in this round."""
  applicationPayouts(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: ApplicationPayoutCondition
    filter: ApplicationPayoutFilter
    orderBy: [ApplicationPayoutsOrderBy!]
  ): ApplicationPayoutsConnection
}

