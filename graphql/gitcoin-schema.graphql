  """Application identifier (sequential or hash depending on Allo version)."""
  id: String!
  """The EVM chain the round is on."""
  chainId: Int!
  """The round this application belongs to."""
  roundId: String!
  """The project that submitted this application."""
  projectId: String!
  """Allo V2 anchor address for the applicant project (null for V1)."""
  anchorAddress: String
  """Current approval status."""
  status: ApplicationStatus!
  """Ordered history of status transitions."""
  statusSnapshots: JSON!
  """Transaction hash of the distribution transaction (null until distributed)."""
  distributionTransaction: String
  """IPFS CID for the application answers/metadata."""
  metadataCid: String
  """Parsed application answers (project details, answers to eligibility questions, etc.)."""
  metadata: JSON
  """Address that submitted this application."""
  createdByAddress: String!
  """Block number at which this application was created."""
  createdAtBlock: BigFloat!
  """Block number at which the status was last updated."""
  statusUpdatedAtBlock: BigFloat!
  """Aggregate: total number of donation transactions to this application."""
  totalDonationsCount: Int!
  """Aggregate: total USD donated to this application."""
  totalAmountDonatedInUsd: Float!
  """Aggregate: number of unique donors to this application."""
  uniqueDonorsCount: Int!
  """Classifier tags."""
  tags: [String]!
  """The round this application belongs to."""
  round: Round
  """The project that applied."""
  project: Project
  """Individual donations received by this application."""
  donations(
    first: Int
    last: Int
    before: Cursor
    after: Cursor
    condition: DonationCondition
    filter: DonationFilter
    orderBy: [DonationsOrderBy!]
  ): DonationsConnection
  """Payout records for this application."""
